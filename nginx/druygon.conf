server {
    server_name druygon.my.id www.druygon.my.id;
    root /opt/druygon;
    index index.html;

    location = /hit {
        access_log /var/log/nginx/druygon-analytics.log druygon_hits;
        empty_gif;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3847;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Service worker — never cache
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # PWA manifest — short cache
    location = /manifest.json {
        add_header Cache-Control "no-cache";
        default_type application/manifest+json;
    }

    # Digital Asset Links for TWA verification
    location /.well-known/assetlinks.json {
        add_header Content-Type "application/json";
        add_header Cache-Control "public, max-age=3600";
    }

    # APK download
    location = /download/druygon.apk {
        alias /opt/druygon/frontend/druygon.apk;
        add_header Content-Disposition "attachment; filename=druygon.apk";
        add_header Content-Type "application/vnd.android.package-archive";
    }
    
    location = /druygon.apk {
        alias /opt/druygon/frontend/druygon.apk;
        add_header Content-Disposition "attachment; filename=druygon.apk";
        add_header Content-Type "application/vnd.android.package-archive";
    }

    location = /parent {
        proxy_pass http://127.0.0.1:3847/parent;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /tutor {
        proxy_pass http://127.0.0.1:3847/tutor;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(js|css)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/druygon.my.id/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/druygon.my.id/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.druygon.my.id) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = druygon.my.id) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name druygon.my.id www.druygon.my.id;
    return 404; # managed by Certbot




}