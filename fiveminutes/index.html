<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5 Menit Matematika — Druygon</title>
  <link rel="stylesheet" href="../css/style.css?v=20260222b">
  <link rel="stylesheet" href="style.css?v=20260222b">
  <script src="../js/profile.js?v=20260223"></script>
</head>
<body>
  <div class="pokeball-bg"></div>
  <a href="../index.html" class="back-btn">⬅</a>

  <!-- MENU SCREEN -->
  <div class="game-container" id="menuScreen">
    <div class="menu-screen slide-in">
      <div class="menu-pokemon">⏱️🔥</div>
      <h1>5 Menit Matematika</h1>
      <p style="color:#aaa; margin:12px 0;">Jawab sebanyak mungkin dalam 5 menit! ⚡</p>

      <div class="setting-section">
        <label class="setting-label">📊 Tingkat Kesulitan</label>
        <div class="diff-btns">
          <button class="poke-btn diff-btn active" data-diff="kelas4" onclick="setDifficulty('kelas4',this)">Kelas 4<br><small>1 — 100</small></button>
          <button class="poke-btn blue diff-btn" data-diff="kelas5" onclick="setDifficulty('kelas5',this)">Kelas 5<br><small>1 — 1000</small></button>
        </div>
      </div>

      <div class="setting-section">
        <label class="setting-label">🔢 Operasi Hitung</label>
        <div class="ops-grid">
          <label class="op-check"><input type="checkbox" id="opAdd" checked><span>➕ Penjumlahan</span></label>
          <label class="op-check"><input type="checkbox" id="opSub" checked><span>➖ Pengurangan</span></label>
          <label class="op-check"><input type="checkbox" id="opMul" checked><span>✖️ Perkalian</span></label>
          <label class="op-check"><input type="checkbox" id="opDiv" checked><span>➗ Pembagian</span></label>
        </div>
      </div>

      <button class="poke-btn start-btn" onclick="startGame()" style="margin-top:20px;font-size:1.3rem;">
        ⚔️ MULAI BATTLE! ⚔️
      </button>
    </div>
  </div>

  <!-- BATTLE SCREEN -->
  <div class="game-container" id="battleScreen" style="display:none;">
    <div class="timer-bar slide-in">
      <div class="timer-icon">⏱️</div>
      <div class="timer-display" id="timerDisplay">5:00</div>
      <div class="timer-progress-bg"><div class="timer-progress" id="timerProgress"></div></div>
    </div>

    <div class="stats-bar slide-in">
      <div class="stat-item"><div class="stat-label">SKOR</div><div class="stat-value" id="scoreVal">0</div></div>
      <div class="stat-item"><div class="stat-label">BENAR</div><div class="stat-value" id="correctVal">0</div></div>
      <div class="stat-item"><div class="stat-label">SALAH</div><div class="stat-value" id="wrongVal">0</div></div>
      <div class="stat-item"><div class="stat-label">STREAK</div><div class="stat-value" id="streakVal">0</div></div>
    </div>

    <div class="question-area slide-in">
      <div class="question-label" id="questionLabel">➕ Penjumlahan</div>
      <div class="question-text" id="questionText">12 + 34 = ?</div>
      <input type="number" inputmode="numeric" pattern="[0-9]*" class="answer-input" id="answerInput" autocomplete="off" placeholder="Ketik jawaban...">
      <button class="poke-btn submit-btn" id="submitBtn" onclick="submitAnswer()">SERANG! ⚡</button>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="streak-display" id="streakDisplay"></div>
  </div>

  <!-- RESULT SCREEN -->
  <div class="game-container" id="resultScreen" style="display:none;">
    <div class="result-screen slide-in" style="display:block;">
      <div class="result-pokemon" id="resultEmoji">🏆</div>
      <h2 id="resultTitle">WAKTU HABIS!</h2>
      <p id="resultMessage" style="color:#aaa;margin:8px 0;"></p>

      <div class="result-card poke-card">
        <div class="stars-display" id="starsDisplay">⭐⭐⭐</div>
        <div class="result-grid">
          <div class="result-item"><span class="result-num" id="rScore">0</span><span class="result-lbl">Skor</span></div>
          <div class="result-item"><span class="result-num" id="rCorrect">0</span><span class="result-lbl">Benar</span></div>
          <div class="result-item"><span class="result-num" id="rWrong">0</span><span class="result-lbl">Salah</span></div>
          <div class="result-item"><span class="result-num" id="rTotal">0</span><span class="result-lbl">Total</span></div>
          <div class="result-item"><span class="result-num" id="rAccuracy">0%</span><span class="result-lbl">Akurasi</span></div>
          <div class="result-item"><span class="result-num" id="rStreak">0</span><span class="result-lbl">Best Streak</span></div>
        </div>
      </div>

      <div style="display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap;">
        <button class="poke-btn" onclick="startGame()">🔄 MAIN LAGI</button>
        <button class="poke-btn blue" onclick="backToMenu()">📋 MENU</button>
        <a href="../index.html" class="poke-btn green">🏠 PORTAL</a>
      </div>
    </div>
  </div>

  <script src="game.js?v=20260222b"></script>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="../index.html">
      <div class="nav-icon">🏠</div>
      <div>Home</div>
    </a>
    <a href="../math/index.html" class="active">
      <div class="nav-icon">⚔️</div>
      <div>Games</div>
    </a>
    <a href="../routes/index.html">
      <div class="nav-icon">🗺️</div>
      <div>Peta</div>
    </a>
    <a href="../collection/index.html">
      <div class="nav-icon">📦</div>
      <div>Koleksi</div>
    </a>
    <a href="../store/index.html">
      <div class="nav-icon">🏪</div>
      <div>Toko</div>
    </a>
  </nav>

<script src="../js/analytics.js?v=20260222b"></script>
  <script src="../js/nav-legacy.js"></script>
</body>
</html>
