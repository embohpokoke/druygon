  <style>
    .sholat-container { max-width: 800px; margin: 0 auto; padding: 20px; }
    .sholat-header { text-align: center; margin-bottom: 30px; }
    .sholat-header h1 { font-family: 'Press Start 2P', monospace; font-size: clamp(1.2rem, 5vw, 1.8rem); color: var(--poke-yellow); margin: 15px 0; }
    .sholat-header .subtitle { color: #aaa; font-size: 0.95rem; }
    
    /* Level Cards */
    .level-card { background: linear-gradient(145deg, #2a2a4a, #1e1e3a); border: 3px solid #555; border-radius: 20px; padding: 20px; margin-bottom: 20px; position: relative; overflow: hidden; transition: all 0.3s; }
    .level-card.unlocked { border-color: var(--poke-yellow); }
    .level-card.unlocked:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255,203,5,0.3); }
    .level-card.locked { opacity: 0.5; cursor: not-allowed; }
    .level-card.locked::after { content: '🔒'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; opacity: 0.3; pointer-events: none; }
    
    .level-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .level-title { font-family: 'Press Start 2P', monospace; font-size: 1rem; color: var(--poke-yellow); }
    .level-num { background: var(--poke-yellow); color: var(--poke-dark); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.9rem; }
    .level-desc { color: #ccc; font-size: 0.9rem; margin-bottom: 15px; }
    .level-progress { font-size: 0.8rem; color: #888; margin-bottom: 12px; }
    .level-status { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; margin-bottom: 10px; }
    .level-status.passed { background: var(--poke-green); color: white; }
    .level-status.locked { background: #555; color: #aaa; }
    .level-status.available { background: var(--poke-blue); color: white; }
    
    .mode-btns { display: flex; gap: 10px; flex-wrap: wrap; }
    .mode-btn { flex: 1; min-width: 100px; padding: 10px 16px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.9rem; border: 2px solid var(--poke-yellow); border-radius: 12px; background: linear-gradient(135deg, var(--poke-blue), #5b6bea); color: white; cursor: pointer; transition: all 0.3s; text-align: center; }
    .mode-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(255,203,5,0.4); }
    .mode-btn:active { transform: scale(0.97); }
    .mode-btn.test { background: linear-gradient(135deg, var(--poke-red), #ff6b35); }
    
    /* Learning Mode */
    .learning-screen { display: none; }
    .learning-screen.active { display: block; }
    .step-card { background: linear-gradient(145deg, #2a2a4a, #1e1e3a); border: 2px solid var(--poke-yellow); border-radius: 15px; padding: 25px; margin-bottom: 20px; }
    .step-num { background: var(--poke-yellow); color: var(--poke-dark); padding: 6px 14px; border-radius: 20px; font-weight: 900; font-size: 0.85rem; display: inline-block; margin-bottom: 12px; }
    .step-title { font-size: 1.3rem; font-weight: 900; color: var(--poke-yellow); margin-bottom: 10px; }
    .step-emoji { font-size: 3rem; margin: 10px 0; text-align: center; }
    .step-desc { color: #ddd; line-height: 1.6; margin-bottom: 12px; }
    
    .arabic-text { font-family: 'Amiri', serif; font-size: 2.2rem; text-align: center; direction: rtl; color: var(--poke-yellow); line-height: 1.8; margin: 15px 0; font-weight: 700; }
    .transliteration { font-style: italic; color: #8BC34A; font-size: 1.1rem; text-align: center; margin: 10px 0; }
    .meaning { color: #aaa; font-size: 0.95rem; text-align: center; margin: 8px 0; }
    
    .nav-buttons { display: flex; gap: 12px; margin-top: 20px; }
    .nav-btn { flex: 1; padding: 12px; font-weight: 700; border: 2px solid var(--poke-yellow); border-radius: 12px; background: linear-gradient(135deg, #555, #444); color: white; cursor: pointer; transition: all 0.3s; }
    .nav-btn:hover { background: var(--poke-yellow); color: var(--poke-dark); }
    .nav-btn.primary { background: linear-gradient(135deg, var(--poke-green), #66BB6A); }
    .nav-btn.primary:hover { transform: scale(1.05); }
    
    /* Quiz Mode */
    .quiz-screen { display: none; }
    .quiz-screen.active { display: block; }
    .quiz-header { text-align: center; margin-bottom: 25px; }
    .quiz-progress { color: #aaa; font-size: 0.9rem; margin-bottom: 8px; }
    .quiz-score { font-size: 1.5rem; font-weight: 900; color: var(--poke-yellow); }
    
    .question-card { background: linear-gradient(145deg, #2a2a4a, #1e1e3a); border: 3px solid var(--poke-yellow); border-radius: 15px; padding: 25px; margin-bottom: 20px; }
    .question-text { font-size: 1.2rem; font-weight: 700; color: white; margin-bottom: 20px; text-align: center; }
    .options-grid { display: grid; gap: 12px; }
    .option-btn { padding: 15px; font-size: 1rem; font-weight: 700; border: 2px solid #555; border-radius: 12px; background: linear-gradient(145deg, #3a3a5a, #2a2a4a); color: white; cursor: pointer; transition: all 0.3s; text-align: left; }
    .option-btn:hover { border-color: var(--poke-yellow); transform: translateX(5px); }
    .option-btn.correct { background: linear-gradient(135deg, var(--poke-green), #66BB6A); border-color: var(--poke-green); }
    .option-btn.wrong { background: linear-gradient(135deg, var(--poke-red), #ff6b35); border-color: var(--poke-red); }
    .option-btn:disabled { opacity: 0.7; cursor: not-allowed; }
    
    .feedback-box { padding: 15px; border-radius: 12px; margin-top: 15px; text-align: center; font-weight: 700; display: none; }
    .feedback-box.show { display: block; }
    .feedback-box.correct { background: rgba(76,175,80,0.2); border: 2px solid var(--poke-green); color: var(--poke-green); }
    .feedback-box.wrong { background: rgba(227,53,13,0.2); border: 2px solid var(--poke-red); color: #ff6b35; }
    
    /* Result Screen */
    .result-screen { display: none; text-align: center; }
    .result-screen.active { display: block; }
    .result-emoji { font-size: 5rem; margin: 20px 0; }
    .result-title { font-family: 'Press Start 2P', monospace; font-size: 1.5rem; color: var(--poke-yellow); margin-bottom: 15px; }
    .result-message { color: #ccc; font-size: 1.1rem; margin-bottom: 20px; line-height: 1.6; }
    .result-stats { background: linear-gradient(145deg, #2a2a4a, #1e1e3a); border: 2px solid var(--poke-yellow); border-radius: 15px; padding: 20px; margin: 20px 0; text-align: left; }
    .result-stats p { margin: 8px 0; font-size: 1.05rem; }
    .result-stats .highlight { color: var(--poke-yellow); font-weight: 900; font-size: 1.2rem; }
    
    @media (max-width: 600px) {
      .sholat-container { padding: 15px; }
      .arabic-text { font-size: 1.8rem; }
      .mode-btns { flex-direction: column; }
      .mode-btn { min-width: auto; }
    }
  </style>

    // === GLOBAL STATE ===
    var currentLevel = 0;
    var currentMode = ''; // 'belajar', 'latihan', 'tes'
    var currentStep = 0;
    var quizIndex = 0;
    var quizCorrect = 0;
    var quizScore = 0;
    var totalXP = 0;
    var totalCoins = 0;

    // === PROGRESS TRACKING ===
    function getProgress() {
      var saved = localStorage.getItem('druygon_sholat_progress');
      if (saved) {
        try {
          return JSON.parse(saved);
        } catch(e) {}
      }
      return {
        currentLevel: 1,
        levels: {
          1: { passed: false, bestScore: 0 },
          2: { passed: false, bestScore: 0 },
          3: { passed: false, bestScore: 0 },
          4: { passed: false, bestScore: 0 },
          5: { passed: false, bestScore: 0 }
        }
      };
    }

    function saveProgress(progress) {
      localStorage.setItem('druygon_sholat_progress', JSON.stringify(progress));
    }

    function isLevelUnlocked(level) {
      var progress = getProgress();
      return level <= progress.currentLevel;
    }

    function unlockNextLevel() {
      var progress = getProgress();
      if (progress.currentLevel < 5) {
        progress.currentLevel++;
        saveProgress(progress);
      }
    }

    function markLevelPassed(level, score) {
      var progress = getProgress();
      progress.levels[level].passed = true;
      if (score > progress.levels[level].bestScore) {
        progress.levels[level].bestScore = score;
      }
      saveProgress(progress);
    }

    // === RENDER MAIN MENU ===
    function renderLevelList() {
      var progress = getProgress();
      var html = '';
      
      for (var lvl = 1; lvl <= 5; lvl++) {
        var data = sholatData[lvl];
        var unlocked = isLevelUnlocked(lvl);
        var levelProg = progress.levels[lvl];
        var statusClass = levelProg.passed ? 'passed' : (unlocked ? 'available' : 'locked');
        var statusText = levelProg.passed ? '✅ Lulus' : (unlocked ? '📘 Tersedia' : '🔒 Terkunci');
        
        html += '<div class="level-card ' + (unlocked ? 'unlocked' : 'locked') + '">';
        html += '<div class="level-header">';
        html += '<div style="display:flex;align-items:center;gap:12px;">';
        html += '<div class="level-num">' + lvl + '</div>';
        html += '<div class="level-title">' + data.title + '</div>';
        html += '</div>';
        html += '<div style="font-size:2rem;">' + data.emoji + '</div>';
        html += '</div>';
        html += '<div class="level-desc">' + data.desc + '</div>';
        html += '<div class="level-status ' + statusClass + '">' + statusText + '</div>';
        
        if (levelProg.bestScore > 0) {
          html += '<div class="level-progress">Skor Terbaik: ' + levelProg.bestScore + '/10</div>';
        }
        
        if (unlocked) {
          html += '<div class="mode-btns">';
          html += '<button class="mode-btn" onclick="startMode(' + lvl + ', \'belajar\')">📖 Belajar</button>';
          html += '<button class="mode-btn" onclick="startMode(' + lvl + ', \'latihan\')">✏️ Latihan</button>';
          html += '<button class="mode-btn test" onclick="startMode(' + lvl + ', \'tes\')">🎯 Tes</button>';
          html += '</div>';
        } else {
          html += '<div style="color:#888;font-size:0.85rem;margin-top:8px;">Selesaikan level sebelumnya untuk membuka</div>';
        }
        
        html += '</div>';
      }
      
      document.getElementById('levelList').innerHTML = html;
    }

    // === START MODE ===
    function startMode(level, mode) {
      currentLevel = level;
      currentMode = mode;
      currentStep = 0;
      quizIndex = 0;
      quizCorrect = 0;
      quizScore = 0;
      totalXP = 0;
      totalCoins = 0;
      
      document.getElementById('mainMenu').style.display = 'none';
      
      if (mode === 'belajar') {
        renderLearningMode();
        document.getElementById('learningScreen').classList.add('active');
      } else {
        renderQuiz(mode === 'tes');
        document.getElementById('quizScreen').classList.add('active');
      }
    }

    // === LEARNING MODE ===
    function renderLearningMode() {
      var data = sholatData[currentLevel];
      var html = '';
      
      html += '<div class="sholat-header">';
      html += '<div style="font-size:3rem;">' + data.emoji + '</div>';
      html += '<h1>' + data.title + '</h1>';
      html += '<p class="subtitle">' + data.desc + '</p>';
      html += '</div>';
      
      if (currentLevel === 1) {
        // Wudhu - steps + doa
        html += '<h3 style="color:var(--poke-yellow);margin:20px 0 15px;">📋 Urutan Wudhu:</h3>';

        html += '<div class="meaning">Artinya: ' + data.doa.sesudah.arti + '</div>';
        html += '</div>';
        
      } else if (currentLevel === 2) {
        // Gerakan
        for (var i = 0; i < data.steps.length; i++) {
          var step = data.steps[i];

          html += '<span class="step-num">Gerakan ' + (i + 1) + '</span>';

          html += '<div class="step-desc">' + step.desc + '</div>';

      } else if (currentLevel === 3) {

          html += '<div class="arabic-text">' + b.arab + '</div>';
          html += '<div class="transliteration">' + b.latin + '</div>';
          html += '<div class="meaning">Artinya: ' + b.arti + '</div>';
          html += '<div class="step-desc" style="margin-top:10px;color:#8BC34A;">📍 ' + b.kapan + '</div>';
          html += '</div>';
        }
        
      } else if (currentLevel === 4) {
        // Simulasi Subuh
        html += '<h3 style="color:var(--poke-yellow);margin:20px 0 15px;">🌅 Urutan Lengkap Sholat Subuh (2 Rakaat):</h3>';

          var sim = data.simulation[i];
          html += '<div class="step-card">';
          html += '<span class="step-num">Langkah ' + sim.step + '</span>';
          html += '<div class="step-title">' + sim.gerakan + '</div>';
          html += '<div class="step-desc">🗣️ Bacaan: <strong>' + sim.bacaan + '</strong></div>';
          html += '</div>';
        }
        html += '<div class="step-card" style="background:rgba(76,175,80,0.1);border-color:var(--poke-green);">';
        html += '<div class="step-title">✅ Setelah itu...</div>';
        html += '<div class="step-desc">Ulangi rakaat ke-2 (tanpa Doa Iftitah), lalu duduk tasyahud akhir, baca sholawat, dan salam. Selesai! 🎉</div>';
        html += '</div>';
        
      } else if (currentLevel === 5) {
        // 5 Waktu
        html += '<h3 style="color:var(--poke-yellow);margin:20px 0 15px;">🕌 5 Waktu Sholat Wajib:</h3>';
        for (var i = 0; i < data.waktu.length; i++) {
          var w = data.waktu[i];
          html += '<div class="step-card">';
          html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">';
          html += '<div class="step-title">' + w.emoji + ' Sholat ' + w.nama + '</div>';
          html += '<div style="background:var(--poke-yellow);color:var(--poke-dark);padding:6px 14px;border-radius:20px;font-weight:900;font-size:1.1rem;">' + w.rakaat + ' Rakaat</div>';
          html += '</div>';
          html += '<div class="step-desc">🕐 Waktu: ' + w.waktu + '</div>';
          html += '<div class="step-desc" style="color:#888;margin-top:5px;">💡 ' + w.keterangan + '</div>';
          html += '</div>';
        }
        html += '<div class="step-card" style="background:rgba(255,203,5,0.1);border-color:var(--poke-yellow);">';

        html += '<div class="step-desc" style="font-size:1.1rem;">2 (Subuh) + 4 (Dzuhur) + 4 (Ashar) + 3 (Maghrib) + 4 (Isya) = <strong style="color:var(--poke-yellow);font-size:1.3rem;">17 Rakaat</strong></div>';

      document.getElementById('learningContent').innerHTML = html;

    function nextStep() {
      // Not used in this simplified version
    }

    // === QUIZ MODE ===
    function renderQuiz(isTest) {
      var questions = quizQuestions[currentLevel];
      
      if (quizIndex >= questions.length) {
        showResult(isTest);
        return;
      }
      
      var q = questions[quizIndex];
      var html = '';
      
      var progress = (quizIndex + 1) + '/' + questions.length;
      var scoreText = 'Skor: ' + quizScore + ' | Benar: ' + quizCorrect + '/' + questions.length;
      
      document.getElementById('quizProgress').textContent = 'Pertanyaan ' + progress;
      document.getElementById('quizScore').textContent = scoreText;
      
      html += '<div class="question-card">';
      html += '<div class="question-text">' + q.q + '</div>';
      html += '<div class="options-grid">';
      
      for (var i = 0; i < q.options.length; i++) {
        html += '<button class="option-btn" onclick="answerQuestion(' + i + ', ' + q.answer + ', ' + isTest + ')">';
        html += q.options[i];
        html += '</button>';
      }
      
      html += '</div>';
      html += '<div class="feedback-box" id="feedbackBox"></div>';
      html += '</div>';
      
      document.getElementById('quizContent').innerHTML = html;
    }

    function answerQuestion(selected, correct, isTest) {
      var isCorrect = (selected === correct);
      var feedbackBox = document.getElementById('feedbackBox');
      var buttons = document.querySelectorAll('.option-btn');
      
      // Disable all buttons
      for (var i = 0; i < buttons.length; i++) {
        buttons[i].disabled = true;
      }
      
      // Highlight answer
      buttons[selected].classList.add(isCorrect ? 'correct' : 'wrong');
      if (!isCorrect) {
        buttons[correct].classList.add('correct');
      }
      
      // Feedback
      if (isCorrect) {
        quizCorrect++;
        if (isTest) {
          quizScore += 10;
          var xp = 20;
          var coins = 10;
          totalXP += xp;
          totalCoins += coins;
          window.druygonProfile.addXP(xp);
          window.druygonProfile.addCoins(coins);
          feedbackBox.innerHTML = '✅ BENAR! +' + xp + ' XP, +' + coins + ' Koin';
        } else {
          feedbackBox.innerHTML = '✅ BENAR!';
        }
        feedbackBox.className = 'feedback-box show correct';
      } else {
        if (isTest) {
          feedbackBox.innerHTML = '❌ Salah. Jawaban yang benar: <strong>' + buttons[correct].textContent + '</strong>';
        } else {
          feedbackBox.innerHTML = '❌ Coba lagi! Jawaban yang benar: <strong>' + buttons[correct].textContent + '</strong>';
        }
        feedbackBox.className = 'feedback-box show wrong';
      }
      
      // Next question after delay
      setTimeout(function() {
        quizIndex++;
        renderQuiz(isTest);
      }, isTest ? 2000 : 2500);
    }

    function showResult(isTest) {
      document.getElementById('quizScreen').classList.remove('active');
      document.getElementById('resultScreen').classList.add('active');
      
      var percentage = Math.round((quizCorrect / quizQuestions[currentLevel].length) * 100);
      var passed = percentage >= 80;
      
      var emoji, title, message;
      
      if (passed) {
        emoji = '🎉🏆✨';
        title = 'LULUS!';
        message = 'Kamu berhasil menguasai level ini dengan skor ' + percentage + '%! Pokemon Trainer sejati! ⚡';
        
        if (isTest) {
          markLevelPassed(currentLevel, quizCorrect);
          unlockNextLevel();
          
          // Bonus XP & Coins for passing
          var bonusXP = 60;
          var bonusCoins = 30;
          totalXP += bonusXP;
          totalCoins += bonusCoins;
          window.druygonProfile.addXP(bonusXP);
          window.druygonProfile.addCoins(bonusCoins);
          
          message += '<br><br>🎁 Bonus Level: +' + bonusXP + ' XP, +' + bonusCoins + ' Koin!';
          
          if (currentLevel < 5) {
            message += '<br><br>🔓 Level berikutnya telah terbuka!';
          } else {
            message += '<br><br>🌟 Kamu telah menyelesaikan SEMUA level Belajar Sholat! Hebat! 🌟';
          }
        }
      } else {
        emoji = '😢';
        title = 'Belum Lulus';
        message = 'Kamu mendapat ' + quizCorrect + '/10 benar (' + percentage + '%). Butuh minimal 80% untuk lulus.<br><br>Jangan menyerah! Coba lagi dengan mode Belajar dulu, lalu ulangi Tes! 💪';
      }
      
      document.getElementById('resultEmoji').textContent = emoji;
      document.getElementById('resultTitle').textContent = title;
      document.getElementById('resultMessage').innerHTML = message;
      document.getElementById('finalScore').textContent = quizScore;
      document.getElementById('finalCorrect').textContent = quizCorrect + '/10';
      document.getElementById('finalCoins').textContent = totalCoins;
      document.getElementById('finalXP').textContent = totalXP;
      
      // Show reward popup if passed test
      if (isTest && passed && typeof showRewardPopup === 'function') {
        var leveledUp = window.druygonProfile.data.level > 1; // Simplified check
        setTimeout(function() {
          showRewardPopup(totalXP, totalCoins, leveledUp);
        }, 500);
      }
    }

    function backToMenu() {
      document.getElementById('mainMenu').style.display = 'block';
      document.getElementById('learningScreen').classList.remove('active');
      document.getElementById('quizScreen').classList.remove('active');
      document.getElementById('resultScreen').classList.remove('active');
      renderLevelList();
    }

    // === INIT ===
    window.onload = function() {
      renderLevelList();
    };
